name = "forge-home"
main = "worker/index.ts"
compatibility_date = "2026-01-01"

# Apex domain — Cloudflare auto-creates the proxied DNS record + TLS cert
# (the forge-mri.dev zone is in this account).
routes = [{ pattern = "forge-mri.dev", custom_domain = true }]

# Keep per-PR preview URLs (used by CI `wrangler versions upload`) working even
# though the production *.workers.dev URL is retired in favor of forge-mri.dev.
preview_urls = true

# Static assets = the built VitePress landing page.
# The Worker runs for any request that doesn't match a static asset
# (i.e. the /forge, /studio, /sentinel subpaths), and serves assets otherwise.
[assets]
directory = "docs/.vitepress/dist"
binding = "ASSETS"

# Subproject origins — each subproject's own live deployment URL.
#
# Leave an origin EMPTY to serve a "coming soon" page for that subpath.
# Set it to the deployment URL to switch the subproject on (no code change).
#
# IMPORTANT: build the subproject with base '/<name>/' and deploy it at its own
# root; the Worker strips the prefix before proxying. See worker/index.ts.
#
# Studio: live — forge-studio docs built with base '/studio/' (forge-studio#43).
[vars]
FORGE_ORIGIN = ""
STUDIO_ORIGIN = "https://forge-studio-80p.pages.dev"
SENTINEL_ORIGIN = ""
